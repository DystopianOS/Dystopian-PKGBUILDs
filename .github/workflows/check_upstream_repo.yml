name: "Check Upstream Repository"

on:
  workflow_dispatch:
    inputs:
      pkgrepo:
        required: true
        type: string
        description: "The Package name of the upstream repository to check for updates (e.g.,"
  workflow_call:
    inputs:
      pkgrepo:
        required: true
        type: string

jobs:
  check-upstream:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PKGBUILDs repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          path: ${{ inputs.pkgrepo }}

      - name: Get Upstream Repository URL
        id: get_upstream_url
        shell: bash
        env:
          PKGREPO: ${{ inputs.pkgrepo }}
        run: |
          set -euo pipefail
          echo "remote_url=$(jq -r --arg pkg "$PKGREPO" '.[$pkg].upstream // empty' .github/packages.json)" >> "$GITHUB_OUTPUT"
          echo "::notice:: Upstream URL for package '$PKGREPO': ${{ steps.get_upstream_url.outputs.remote_url }}"

      - name: Add upstream remote
        id: add_upstream
        uses: DCx7C5/actions/git-add-upstream@v1
        with:
          remote_url: "${{ steps.get_upstream_url.outputs.remote_url }}"

