name: "Check Upstream Repository"

on:
  workflow_dispatch:
    inputs:
      pkgrepo:
        required: true
        type: string
        description: "The Package name of the upstream repository to check for updates (e.g.,"
  workflow_call:
    inputs:
      pkgrepo:
        required: true
        type: string

jobs:
  check-upstream:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PKGBUILDs repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get Upstream Repository URL
        id: get_upstream_url
        uses: DCx7C5/actions/json-packages@v1
        with:
          action: 'get'
          package_name: ${{ inputs.pkgrepo }}

      - id: test
        shell: bash
        run: |
          set -euo pipefail
          
          echo "::error::${{ steps.get_upstream_url.outputs.upstream }}"
          echo "::error::${{ steps.get_upstream_url.outputs.custom }}"
          echo "::error::$(ls -als)"
