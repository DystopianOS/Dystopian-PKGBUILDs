name: Build & Validate Packages

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: '0 5 * * 2,5'
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  discover:
    runs-on: ubuntu-latest
    container:
      image: archlinux:base-devel
      options: --user 1000:1000
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: Update & install tools as root
        run: |
          pacman -Syu --noconfirm --needed git jq   # jq optional if you keep it

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - id: set-matrix
        run: |
          # Your matrix logic here (now git + jq available)
          pkg_dirs=$(find . -maxdepth 2 -type f -name PKGBUILD -not -path '*/\.*' -printf '%h\n' |
                     sed 's|^\./||' |
                     sort -u)
          
          json_array=$(echo "$pkg_dirs" | sed 's/"/\\"/g; s/^/"/; s/$/",/' | tr '\n' ' ' | sed 's/,$//')
          matrix="{ \"pkgdir\": [${json_array}] }"
          
          echo "matrix=$matrix" >> "$GITHUB_OUTPUT"
          count=$(echo "$pkg_dirs" | wc -l)
          echo "Matrix size: $count"

  build:
    needs: discover
    runs-on: ubuntu-latest
    container:
      image: archlinux:base-devel
      options: --user 1000:1000
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.discover.outputs.matrix) }}
    steps:
      - name: Install git (already done in discover? Or repeat if needed)
        run: |
          # If packages need refreshing or extra tools, use fakeroot/sudo if set up
          # But prefer: install everything in a separate root step/job if possible
          sudo pacman -Syu --noconfirm --needed git gnupg namcap || true  # ← sudo if wheel/sudo configured

      - uses: actions/checkout@v4


      - name: Install dependencies
        run: |
          pacman -Syu --noconfirm --needed base-devel git gnupg namcap

      - name: Import GPG key (if provided)
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: |
          if [ -n "$GPG_PRIVATE_KEY" ]; then
            echo "$GPG_PRIVATE_KEY" | gpg --batch --yes --passphrase "$GPG_PASSPHRASE" --import
            gpg --list-secret-keys --keyid-format LONG
            echo "allow-loopback-pinentry" >> ~/.gnupg/gpg-agent.conf
            gpg-connect-agent reloadagent /bye || true
          else
            echo "No GPG key → unsigned build"
          fi

      - name: Build & sign package → ${{ matrix.pkgdir }}
        continue-on-error: true
        working-directory: ${{ matrix.pkgdir }}
        run: |
          KEYID=$(gpg --list-secret-keys --keyid-format LONG | grep -oP '(?<=sec\s+)[^/]+' | head -1 || echo "")
          makepkg -s --noconfirm ${KEYID:+--sign --key $KEYID}

      - name: namcap validation → ${{ matrix.pkgdir }}
        continue-on-error: true
        working-directory: ${{ matrix.pkgdir }}
        run: |
          for pkg in *.pkg.tar.zst; do
            [ -f "$pkg" ] || continue
            namcap -i "$pkg" > namcap-${{ matrix.pkgdir }}.txt 2>&1 || true
          done

      - name: Upload per-package artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: result-${{ matrix.pkgdir }}
          path: |
            ${{ matrix.pkgdir }}/*.pkg.tar.*
            ${{ matrix.pkgdir }}/*.pkg.tar.*.sig
            ${{ matrix.pkgdir }}/namcap-*.txt
          if-no-files-found: warn
          retention-days: 2

  aggregate-failures:
    needs: [discover, build]
    if: always()
    runs-on: ubuntu-latest
    outputs:
      summary: ${{ steps.summary.outputs.summary }}
      has_failures: ${{ steps.summary.outputs.has_failures }}
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: result-*
          path: results/
          merge-multiple: true

      - id: summary
        run: |
          SUMMARY=""
          HAS_FAILURES=false

          for dir in $(jq -r '.pkgdir[]' <<< '${{ needs.discover.outputs.matrix }}'); do
            pkg_files=$(ls results/result-$dir/*.pkg.tar.zst 2>/dev/null || true)
            namcap_file="results/result-$dir/namcap-$dir.txt"

            failed_build=false
            failed_namcap=false

            [[ -z "$pkg_files" ]] && failed_build=true
            [[ -f "$namcap_file" ]] && grep -qiE 'error|warning' "$namcap_file" && failed_namcap=true

            if [[ $failed_build == true || $failed_namcap == true ]]; then
              HAS_FAILURES=true
              SUMMARY+="### $dir\n"
              [[ $failed_build == true ]] && SUMMARY+="- Build/sign failed\n"
              [[ $failed_namcap == true ]] && SUMMARY+="- namcap found issues\n\n"
            fi
          done

          {
            echo "summary<<EOF"
            echo "$SUMMARY"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
          echo "has_failures=$HAS_FAILURES" >> "$GITHUB_OUTPUT"

          echo -e "$SUMMARY" >> "$GITHUB_STEP_SUMMARY"

  report:
    needs: aggregate-failures
    if: always() && needs.aggregate-failures.outputs.has_failures == 'true' && github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Comment on PR
        uses: peter-evans/create-or-update-comment@v5
        with:
          issue-number: ${{ github.event.pull_request.number }}
          body: |
            ### :warning: Some packages failed validation / build

            ${{ needs.aggregate-failures.outputs.summary }}

            → Check artifacts for namcap logs and package files