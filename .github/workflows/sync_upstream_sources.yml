name: "Sync Upstream Sources"

on:
  workflow_dispatch:
    inputs:
      source_name:
        description: "Optional source name from .github/upstream-sources.json"
        required: false
        type: string
      dry_run:
        description: "Show changes without committing"
        required: false
        type: boolean
        default: false
  schedule:
    - cron: "17 */6 * * *"

permissions:
  contents: write

concurrency:
  group: "sync-upstream-sources"
  cancel-in-progress: true

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Generate GitHub App Token
        id: app_token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.DYSTOPIANBOT_APP_ID }}
          private-key: ${{ secrets.DYSTOPIANBOT_KEY }}

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ steps.app_token.outputs.token }}

      - name: Sync configured upstream sources
        shell: bash
        run: |
          set -euo pipefail
          config_file=".github/upstream-sources.json"
          [[ -f "$config_file" ]] || { echo "::error::Missing $config_file"; exit 1; }

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          selection="${{ inputs.source_name }}"
          jq_filter='.[]'
          if [[ -n "${selection}" ]]; then
            jq_filter=".[] | select(.name == \"${selection}\")"
          fi

          matched=0
          while IFS= read -r row; do
            [[ -z "${row}" ]] && continue
            matched=$((matched + 1))

            name="$(jq -r '.name' <<<"$row")"
            repo="$(jq -r '.repo' <<<"$row")"
            ref="$(jq -r '.ref // "main"' <<<"$row")"
            target_dir="$(jq -r '.target_dir' <<<"$row")"
            sync_method="$(jq -r '.sync_method // "subtree"' <<<"$row")"

            if [[ -z "${target_dir}" || "${target_dir}" == "null" ]]; then
              echo "::error::target_dir is required for source ${name}" >&2
              exit 1
            fi
            if [[ "${sync_method}" != "subtree" ]]; then
              echo "::error::Unsupported sync_method '${sync_method}' for source ${name}. Use 'subtree'." >&2
              exit 1
            fi

            remote_name="upstream-$(printf '%s' "$name" | tr -cs '[:alnum:]' '-')"
            remote_name="${remote_name%-}"
            [[ -n "${remote_name}" ]] || remote_name="upstream-src"

            if git remote get-url "$remote_name" >/dev/null 2>&1; then
              git remote set-url "$remote_name" "$repo"
            else
              git remote add "$remote_name" "$repo"
            fi

            echo "Syncing ${name} (${repo}@${ref}) via subtree -> ${target_dir}"
            git fetch --depth 1 "$remote_name" "$ref"

            if git log --all --grep="^git-subtree-dir: ${target_dir}$" --oneline | grep -q .; then
              git subtree pull --prefix="$target_dir" "$remote_name" "$ref" --squash
            else
              if [[ -e "$target_dir" ]]; then
                rm -rf "$target_dir"
                git add -A "$target_dir" || true
              fi
              git subtree add --prefix="$target_dir" "$remote_name" "$ref" --squash
            fi

            git remote remove "$remote_name"
          done < <(jq -c "${jq_filter}" "$config_file")

          if [[ "$matched" -eq 0 ]]; then
            echo "::error::No matching source entries found."
            exit 1
          fi

      - name: Show changes
        shell: bash
        run: |
          set -euo pipefail
          git status --short

      - name: Commit and push updates
        if: ${{ !inputs.dry_run }}
        shell: bash
        run: |
          set -euo pipefail
          git fetch origin "${{ github.ref_name }}"

          ahead="$(git rev-list --count "origin/${{ github.ref_name }}..HEAD" || echo 0)"
          if ! git diff --quiet; then
            git add -A
            git commit -m "[ci] Sync upstream sources"
            ahead="$(git rev-list --count "origin/${{ github.ref_name }}..HEAD" || echo 0)"
          fi

          if [[ "${ahead}" -eq 0 ]]; then
            echo "No upstream source changes detected."
            exit 0
          fi

          git push origin HEAD:${{ github.ref_name }}

      - name: Telegram notification
        if: >-
          always() &&
          (secrets.TG_BOT_TOKEN != '' || secrets.TELEGRAM_BOT_TOKEN != '') &&
          (secrets.TG_CHAT_ID != '' || secrets.TELEGRAM_CHAT_ID != '')
        uses: DCx7C5/actions/tg-notify@v1
        with:
          tg-token: ${{ secrets.TG_BOT_TOKEN || secrets.TELEGRAM_BOT_TOKEN }}
          chat-id: ${{ secrets.TG_CHAT_ID || secrets.TELEGRAM_CHAT_ID }}
          parse-mode: "HTML"
          message: >-
            🔄 <b>Upstream source sync</b>%0A
            Repo: <code>${{ github.repository }}</code>%0A
            Source filter: <code>${{ inputs.source_name || 'all' }}</code>%0A
            Dry run: <code>${{ inputs.dry_run || false }}</code>%0A
            Result: <code>${{ job.status }}</code>%0A
            Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
