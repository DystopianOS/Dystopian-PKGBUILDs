name: Prepare PKGBUILDs and Dispatch Package Release

on:
  workflow_call:
    inputs:
      package:
        description: Optional single package to process
        required: false
        type: string
      channel:
        description: Optional channel override (e.g. core, extra, x86_64)
        required: false
        default: core
        type: string
  push:
    branches:
      - main
      - devel
  workflow_dispatch:
    inputs:
      package:
        description: Optional single package to process
        required: false
      channel:
        description: Optional channel override (e.g. core, extra)
        required: false
        default: core

permissions:
  contents: write

jobs:
  prepare-and-dispatch:
    runs-on: ubuntu-latest
    steps:
      - name: Generate GitHub App Token
        id: app_token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ secrets.DYSTOPIANBOT_CLIENT_ID }}
          private-key: ${{ secrets.DYSTOPIANBOT_KEY }}
          owner: DystopianOS

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ steps.app_token.outputs.token }}

      - name: Resolve package set
        id: resolve
        shell: bash
        run: |
          set -euo pipefail
          manual_pkg='${{ inputs.package || '' }}'
          manual_channel='${{ inputs.channel || 'core' }}'
          [[ -n "$manual_pkg" ]] || manual_pkg="$(jq -r '.inputs.package // empty' "$GITHUB_EVENT_PATH")"
          [[ -n "$manual_channel" ]] || manual_channel="$(jq -r '.inputs.channel // "core"' "$GITHUB_EVENT_PATH")"

          if [[ ("${GITHUB_EVENT_NAME}" == "workflow_dispatch" || "${GITHUB_EVENT_NAME}" == "workflow_call") && -n "$manual_pkg" ]]; then
            mapfile -t pkgs < <(printf '%s\n' "$manual_pkg" | sed '/^$/d')
          else
            before="$(jq -r '.before // empty' "$GITHUB_EVENT_PATH")"
            after="${GITHUB_SHA}"
            if [[ -z "$before" || "$before" == "0000000000000000000000000000000000000000" ]]; then
              before="$(git rev-list --max-parents=0 "$after" | tail -n1)"
            fi

            mapfile -t pkgs < <(
              git diff --name-only "$before" "$after" \
                | awk -F/ 'NF > 1 {print $1}' \
                | sort -u \
                | while read -r p; do
                    [[ -f "$p/PKGBUILD" ]] && printf '%s\n' "$p"
                  done
            )
          fi

          if (( ${#pkgs[@]} == 0 )); then
            echo "has_packages=false" >> "$GITHUB_OUTPUT"
            echo "packages_json=[]" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          channels_cfg=".github/repo-channels.json"
          [[ -f "$channels_cfg" ]] || echo '{}' > "$channels_cfg"

          entries='[]'
          for pkg in "${pkgs[@]}"; do
            channel="$manual_channel"
            mapped="$(jq -r --arg p "$pkg" '.[$p] // empty' "$channels_cfg" 2>/dev/null || true)"
            [[ -n "$mapped" ]] && channel="$mapped"
            entries="$(jq -c --arg pkg "$pkg" --arg channel "$channel" '. += [{"package":$pkg,"channel":$channel}]' <<<"$entries")"
          done

          echo "has_packages=true" >> "$GITHUB_OUTPUT"
          echo "packages_json=$entries" >> "$GITHUB_OUTPUT"

      - name: Prepare PKGBUILDs in Arch
        if: steps.resolve.outputs.has_packages == 'true'
        uses: DCx7C5/actions/arch-run-cmd@v1
        with:
          run-with-sudo: "true"
          enable-ccache: "true"
          gh-token: ${{ steps.app_token.outputs.token }}
          command: |
            set -euo pipefail
            pkgs='${{ steps.resolve.outputs.packages_json }}'
            mapfile -t pkg_list < <(jq -r '.[].package' <<<"$pkgs")
            for pkg in "${pkg_list[@]}"; do
              cd "$pkg"
              updpkgsums
              makepkg --printsrcinfo > .SRCINFO
              makepkg --verifysource --noconfirm
              cd - >/dev/null
            done

      - name: Commit PKGBUILD metadata refresh
        if: steps.resolve.outputs.has_packages == 'true'
        shell: bash
        run: |
          set -euo pipefail
          if git diff --quiet; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "[ci] Refresh PKGBUILD metadata"
          git push origin HEAD:${GITHUB_REF_NAME}

      - name: Dispatch package release events
        if: steps.resolve.outputs.has_packages == 'true'
        env:
          GH_TOKEN: ${{ steps.app_token.outputs.token }}
        shell: bash
        run: |
          set -euo pipefail
          pkgs='${{ steps.resolve.outputs.packages_json }}'
          source_sha="$(git rev-parse HEAD)"
          while IFS= read -r row; do
            pkg="$(jq -r '.package' <<<"$row")"
            channel="$(jq -r '.channel' <<<"$row")"
            pkgver="$(awk -F= '/^pkgver=/{print $2; exit}' "$pkg/PKGBUILD")"
            pkgrel="$(awk -F= '/^pkgrel=/{print $2; exit}' "$pkg/PKGBUILD")"
            version="${pkgver}-${pkgrel}"
            gh api repos/DystopianOS/repo/dispatches \
              -f event_type='pkgbuild-release-request' \
              -F client_payload="$(jq -c \
                --arg package "$pkg" \
                --arg version "$version" \
                --arg channel "$channel" \
                --arg source_repo "DystopianOS/Dystopian-PKGBuilds" \
                --arg source_sha "$source_sha" \
                '{package:$package,version:$version,channel:$channel,source_repo:$source_repo,source_sha:$source_sha}')"
          done < <(jq -c '.[]' <<<"$pkgs")
