name: Telegram Notifications

on:
  workflow_run:
    workflows:
      - "Run Command in Arch Linux Environment"
      - "Build and Push Arch Run Command Docker Image"
      - "Build Package"
      - "Prepare PKGBUILDs and Dispatch Package Release"
      - "Cleanup Repository Artifacts"
      - "Delete Package"
      - "Manage PKGBUILD Metadata"
      - "Package Auto-Update System"
      - "Package Build and Validation"
      - "Security Scanning"
      - "Sync Upstream Sources"
    types:
      - completed
  release:
    types:
      - published
      - prereleased

jobs:
  notify-release:
    if: ${{ github.event_name == 'release' }}
    runs-on: ubuntu-latest
    steps:
      - name: Notify Telegram (release)
        uses: DCx7C5/actions/tg-notify-release@v1
        with:
          tg-token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          chat-id: ${{ secrets.TELEGRAM_CHANNEL_ID }}
          repository: ${{ github.repository }}
          commit: ${{ github.sha }}
          branch: ${{ github.ref_name }}
          actor: ${{ github.actor }}
          fingerprint: "N/A"
          tag-name: ${{ github.event.release.tag_name }}
          release-name: ${{ github.event.release.name || github.event.release.tag_name }}

  notify-workflow:
    if: ${{ github.event_name == 'workflow_run' && (github.event.workflow_run.conclusion == 'success' || github.event.workflow_run.conclusion == 'failure') }}
    runs-on: ubuntu-latest
    steps:
      - name: Notify Telegram (workflow)
        uses: DCx7C5/actions/tg-notify@v1
        with:
          tg-token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          chat-id: ${{ secrets.TELEGRAM_CHANNEL_ID }}
          parse-mode: HTML
          message: |
            <b>⚙️ Workflow Completed</b>

            <b>Repository:</b> <code>${{ github.repository }}</code>
            <b>Workflow:</b> <code>${{ github.event.workflow_run.name }}</code>
            <b>Status:</b> <code>${{ github.event.workflow_run.conclusion }}</code>
            <b>Branch:</b> <code>${{ github.event.workflow_run.head_branch }}</code>
            <b>Run:</b> <a href="${{ github.event.workflow_run.html_url }}">Open workflow run</a>
