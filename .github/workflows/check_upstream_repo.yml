name: "Check Upstream Repository"

on:
  workflow_dispatch:
    inputs:
      pkgrepo:
        required: true
        type: string
        description: "The Package name of the upstream repository to check for updates (e.g.,"
  workflow_call:
    inputs:
      pkgrepo:
        required: true
        type: string

jobs:
  check-upstream:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PKGBUILDs repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Add upstream repository
        id: add_upstream
        uses: DCx7C5/actions/git-add-upstream@v1
        with:
          remote_url: 'https://github.com/CachyOS/CachyOS-PKGBUILDS'

      - name: Fetch upstream repository
        id: fetch_upstream
        uses: DCx7C5/actions/git-fetch@v1
        with:
          remote: upstream
          ref: main
          prune: true

      - name: Check for new, changed and removed PKGBUILD directories
        id: check_pkgbuilds
        run: |

          # Find new directories with PKGBUILD
          NEW_DIRS=$(git diff --name-only HEAD upstream/main | grep '^[^/]*/PKGBUILD$' | cut -d'/' -f1 | sort -u | while read dir; do
            if [ ! -d "$dir" ] || ! git ls-tree HEAD "$dir" >/dev/null 2>&1; then
              echo "$dir"
            fi
          done)

          # Find changed directories with PKGBUILD
          CHANGED_DIRS=$(git diff --name-only HEAD upstream/main | grep '^[^/]*/PKGBUILD$' | cut -d'/' -f1 | sort -u | while read dir; do
            if git ls-tree HEAD "$dir" >/dev/null 2>&1; then
              echo "$dir"
            fi
          done)

          # Find removed directories with PKGBUILD
          REMOVED_DIRS=$(git diff --diff-filter=D --name-only HEAD upstream/main | grep '^[^/]*/PKGBUILD$' | cut -d'/' -f1 | sort -u)

          # Output results
          echo "new_dirs<<EOF" >> $GITHUB_OUTPUT
          echo "$NEW_DIRS" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

          echo "changed_dirs<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGED_DIRS" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

          echo "removed_dirs<<EOF" >> $GITHUB_OUTPUT
          echo "$REMOVED_DIRS" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Display results
        run: |
          echo "### New PKGBUILD directories:" >> $GITHUB_STEP_SUMMARY
          echo "${{ steps.check_pkgbuilds.outputs.new_dirs }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Changed PKGBUILD directories:" >> $GITHUB_STEP_SUMMARY
          echo "${{ steps.check_pkgbuilds.outputs.changed_dirs }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Removed PKGBUILD directories:" >> $GITHUB_STEP_SUMMARY
          echo "${{ steps.check_pkgbuilds.outputs.removed_dirs }}" >> $GITHUB_STEP_SUMMARY
