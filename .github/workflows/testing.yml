name: "Testing things"

on:
  workflow_dispatch:
    inputs:
      test_input:
        description: "A test input for the workflow"
        required: false
        default: "default value"
        type: string

jobs:
  test-json:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write

    steps:
      - name: GitHub App Token
        id: app_token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.DYSTOPIANBOT_APP_ID }}
          private-key: ${{ secrets.DYSTOPIANBOT_KEY }}

      - name: Test Get ALL JSON_PACKAGES
        id: all_json_packages
        uses: DCx7C5/actions/aur-json-packages@v1
        with:
          json_file: ${{ vars.JSON_PACKAGES }}
          action: 'get'
          variable_scope: 'org'
          github_token: ${{ steps.app_token.outputs.token }}

      - name: Get one package from JSON_PACKAGES
        id: one_json_package
        uses: DCx7C5/actions/aur-json-packages@v1
        with:
          json_file: ${{ vars.JSON_PACKAGES }}
          pkg_name: 'zstd/zstd-pgo'
          action: 'get'
          github_token: ${{ steps.app_token.outputs.token }}

      - name: Add a package to JSON_PACKAGES
        id: add_json_package
        uses: DCx7C5/actions/aur-json-packages@v1
        with:
          json_file: ${{ vars.JSON_PACKAGES }}
          pkg_name: 'zzzzzz'
          action: 'add'
          key: 'custom'
          value: true
          steps_out: 'true'
          github_token: ${{ steps.app_token.outputs.token }}

      - name: Remove the added package from JSON_PACKAGES
        id: remove_json_package
        uses: DCx7C5/actions/aur-json-packages@v1
        with:
          json_file: ${{ vars.JSON_PACKAGES }}
          action: 'remove'
          pkg_name: 'zstd/zstd-pgo'
          steps_out: 'true'
          github_token: ${{ steps.app_token.outputs.token }}

      - name: Update a package in JSON_PACKAGES
        id: update_json_package
        uses: DCx7C5/actions/aur-json-packages@v1
        with:
          json_file: ${{ vars.JSON_PACKAGES }}
          action: 'update'
          pkg_name: 'zzzzzz'
          key: 'repository'
          value: ${{ inputs.test_input }}
          steps_out: 'true'
          github_token: ${{ steps.app_token.outputs.token }}

      - name: Get all packages where custom is true
        id: get_custom_packages
        uses: DCx7C5/actions/aur-json-packages@v1
        with:
          json_file: ${{ vars.JSON_PACKAGES }}
          action: 'get_all'
          key: 'custom'
          value: 'true'
          steps_out: 'true'
          github_token: ${{ steps.app_token.outputs.token }}

      - name: Summarize results
        run: |
          echo '::notice::All packages: ${{ steps.all_json_packages.outputs.packages }}'
          echo "::notice::One package: ${{ steps.one_json_package.outputs.packages }}"
          echo "::notice::Added package: ${{ steps.add_json_package.outputs.packages }}"
          echo "::notice::Removed package: ${{ steps.remove_json_package.outputs.packages }}"
          echo "::notice::Updated package: ${{ steps.update_json_package.outputs.packages }}"
          echo "::notice::Custom packages: ${{ steps.get_custom_packages.outputs.packages }}"

  test-job:
    runs-on: ubuntu-latest
    steps:
      - name: Print test input
        run: |
          echo "The test input is: ${{ inputs.test_input }}"

      - name: Run a simple command
        run: |
          echo "Running a simple command..."
          if command -v gh >/dev/null 2>&1; then
            echo "gh is available"
          else
            echo "gh is not available"
          fi
          if gh copilot --help >/dev/null 2>&1; then
            echo "gh copilot is available"
          else
            echo "gh copilot is not available"
          fi
          if command -v copilot >/dev/null 2>&1; then
            echo "copilot is available"
          else
            echo "copilot is not available"
          fi
          if command -v copilot-cli >/dev/null 2>&1; then
            echo "copilot-cli is available"
          else
            echo "copilot-cli is not available"
          fi

      - name: Check SSLencryption
        id: ssl_encrypt
        uses: DCx7C5/actions/ssl-encrypt@v1
        with:
          in: ${{ inputs.test_input }}
          input_encoding: 'raw'
          input_type: 'inline'
          output_encoding: 'base64'
          passphrase: 'pass'
          cleanup: 'false'

      - name: Check
        shell: bash
        run: |
          echo "::notice::${{ steps.ssl_encrypt.outputs.out }}"
          echo "::notice::${{ steps.ssl_encrypt.outputs.type }}"
          echo "::notice::${{ steps.ssl_encrypt.outputs.encoding }}"
          echo "::notice::${{ steps.ssl_encrypt.outputs.out }}"
          
          echo "::notice::Decrypting content..."
          echo "${{ steps.ssl_encrypt.outputs.out }}" | base64 -d | openssl enc -aes-256-cbc -d -pass pass:pass -pbkdf2 || {
            echo "::error::Decryption failed" >&2
            exit 1
          }

      - name: Check Decryption
        id: ssl_decrypt
        uses: DCx7C5/actions/ssl-decrypt@v1
        with:
          in: ${{ steps.ssl_encrypt.outputs.out }}
          input_encoding: 'base64'
          input_type: 'inline'
          passphrase: 'pass'
          output_encoding: 'raw'

      - name: Print decrypted content
        shell: bash
        run: |
          echo "${{ steps.ssl_decrypt.outputs.out }}" > test.txt
          test=$(cat test.txt)
          echo "::notice::Decrypted content: ${test:0:-1}r"

      - name: Unique test input
        run: |
          unique_value="test-$(date +%s%N)-foobar"
          echo "::notice::Unique test input: $unique_value"
          echo "unique_value=$unique_value" >> $GITHUB_ENV

      - name: Encrypt unique value
        id: ssl_encrypt_unique
        uses: DCx7C5/actions/ssl-encrypt@v1
        with:
          in: ${{ env.unique_value }}
          input_encoding: 'raw'
          input_type: 'inline'
          output_encoding: 'base64'
          passphrase: 'pass'
          cleanup: 'false'

      - name: Decrypt unique value
        id: ssl_decrypt_unique
        uses: DCx7C5/actions/ssl-decrypt@v1
        with:
          in: ${{ steps.ssl_encrypt_unique.outputs.out }}
          input_encoding: 'base64'
          input_type: 'inline'
          passphrase: 'pass'
          output_encoding: 'raw'

      - name: Print decrypted unique value
        shell: bash
        run: |
          echo "${{ steps.ssl_decrypt_unique.outputs.out }}" > test_unique.txt
          test_unique=$(cat test_unique.txt)
          echo "::notice::Decrypted unique content: $(echo -n "${test_unique:0:-1}r")"
