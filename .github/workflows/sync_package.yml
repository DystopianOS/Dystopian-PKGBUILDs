name: "Sync Package"

on:
  workflow_call:
    inputs:
      upstream_repo:
        description: "<owner/repo> of the upstream repository"
        required: true
        type: string
      upstream_ref:
        description: "Git ref to fetch from upstream"
        required: true
        type: string
      pkg_name:
        description: "Target package name in this repository"
        required: true
        type: string
      upstream_dir:
        description: "Source package directory in upstream repository"
        required: true
        type: string
      change_type:
        description: "Change type for commit message (add/update)"
        required: false
        default: "update"
        type: string

    outputs:
      package_name:
        description: "Resolved package name"
        value: ${{ jobs.sync-package.outputs.package_name }}
      success:
        description: "Whether the sync was successful (not skipped or failed)"
        value: ${{ jobs.build-package.outcomes == 'success' || jobs.build-package.outcomes.success }}


jobs:
  sync-package:
    runs-on: ubuntu-latest

    steps:
      - name: Generate GitHub App Token
        id: app_token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.DYSTOPIANBOT_APP_ID }}
          private-key: ${{ secrets.DYSTOPIANBOT_KEY }}

      - name: Checkout PKGBUILDs repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: '${{ steps.app_token.outputs.token }}'

      - name: Add upstream remote
        uses: DCx7C5/actions/git-add-remote@v1
        with:
          remote_url: https://github.com${{ inputs.upstream_repo || secrets.UPSTREAM_REPO }}.git
          remote_name: upstream

      - name: Fetch upstream
        uses: DCx7C5/actions/git-fetch@v1
        with:
          remote: upstream
          ref: ${{ inputs.upstream_ref || secrets.UPSTREAM_REF }}

      - name: Import GPG key
        id: gpg_import
        uses: ./gpg-import
        env:
          GH_TOKEN: ${{ steps.app_token.outputs.token }}
        with:
          method: 'inline'
          gpg_key: ${{ secrets.GPG_PRIVATE_KEY }}
          gpg_pass: ${{ secrets.GPG_PASSPHRASE }}
          delete_after_import: 'true'
          configure_git: 'true'
          setup_home: 'true'
          preset_pass: 'true'

      - name: Get info from packages.json
        id: json_info
        if: inputs.change_type == 'update'
        uses: DCx7C5/actions/json-packages@v1
        with:
          action: get
          package_name: ${{ inputs.pkg_name }}
          path: .ci/packages.json

      - name: Sync package directly from upstream
        id: sync
        uses: DCx7C5/actions/aur-sync-pkg@v1
        with:
          remote_name: 'upstream'
          pkg_name: ${{ inputs.pkg_name }}
          remote_pkg_name: ${{ inputs.upstream_dir }}
          sync_type: ${{ inputs.change_type }}
          remote_repo: ${{ inputs.upstream_repo || steps.json_info.outputs.upstream || secrets.UPSTREAM_REPO }}
          remote_ref: ${{ inputs.upstream_ref || secrets.UPSTREAM_REF }}
          stage_change: 'true'
          is_custom: ${{ steps.json_info.outputs.custom == 'true' || steps.json_info.outputs.custom || 'false' }}

      - name: Run updpkgsums
        uses: DCx7C5/actions/aur-updpkgsums@v1
        with:
          pkg_name: ${{ steps.sync.outputs.target_dir }}
          working_directory: ${{ github.workspace || '.' }}

      - name: Recreate .SRCINFO
        uses: DCx7C5/actions/aur-create-srcinfo@v1
        with:
          pkg_name: ${{ steps.sync.outputs.target_dir }}
          working_directory: ${{ github.workspace || '.' }}

      - name: Validate PKGBUILD
        uses: DCx7C5/actions/aur-validate-pkg@v1
        with:
          pkg_name: ${{ steps.sync.outputs.target_dir }}
          working_directory: ${{ github.workspace || '.' }}

      - name: Stage changes
        uses: DCx7C5/actions/git-stage-changes@v1
        with:
          include_untracked: 'true'
          paths: |
            ${{ inputs.upstream_dir }}
            ${{ inputs.pkg_name }}
            .ci/packages.json
            **/.SRCINFO
            **/PKGBUILD

      - name: Commit changes
        id: commit
        if: steps.staged.outputs.has_changes == 'true'
        uses: DCx7C5/actions/git-commit@v1
        with:
          copilot: 'true'
          github_token: ${{ steps.app_token.outputs.token || github.token }}

      - name: Push changes
        if: steps.commit.outputs.committed == 'true'
        uses: DCx7C5/actions/git-push-changes@v1
        with:
          github_token: ${{ steps.app_token.outputs.token || github.token }}

  build-package:
    needs: sync-package
    if: needs.sync-package.outputs.success == 'true'
    uses: ./.github/workflows/build_package.yml
    secrets: inherit
    with:
      pkg_name: ${{ needs.sync-package.outputs.package_name }}
