name: Deploy to GitHub Release

on:
  workflow_run:
    workflows: [Build & Validate Packages]
    types: [completed]
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    container: archlinux:base

    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          pattern: result-*
          path: artifacts/
          merge-multiple: true

      - name: Create & sign repo database
        working-directory: artifacts
        run: |
          REPO="custom-repo"   # ← CHANGE THIS
          SIGN_OPTS=""

          # Try to import key again (in case deploy runs in separate runner)
          if [[ -n "${{ secrets.GPG_PRIVATE_KEY }}" ]]; then
            echo "${{ secrets.GPG_PRIVATE_KEY }}" | gpg --batch --yes --passphrase "${{ secrets.GPG_PASSPHRASE }}" --import
            gpg-connect-agent reloadagent /bye
            KEYID=$(gpg --list-secret-keys --keyid-format LONG | grep -oP '(?<=sec\s+)[^/]+' | head -1 || echo "")
            [[ -n "$KEYID" ]] && SIGN_OPTS="--sign --key $KEYID"
          fi

          repo-add $SIGN_OPTS "$REPO.db.tar.gz" *.pkg.tar.zst
          ln -sf "$REPO.db.tar.gz" "$REPO.db"

      - name: Deploy signed artifacts to release tag "repository"
        env:
          GH_TOKEN: ${{ github.token }}
        working-directory: artifacts
        run: |
          REPO_NAME="custom-repo"   # ← CHANGE THIS

          gh release upload repository \
            *.pkg.tar.zst \
            *.pkg.tar.zst.sig \
            "$REPO_NAME.db.tar.gz" \
            "$REPO_NAME.db.tar.gz.sig" \
            "$REPO_NAME.db" \
            --clobber || true

          gh release view repository 2>/dev/null || \
            gh release create repository \
              --title "Custom Arch Repository" \
              --notes "Signed binary packages for Arch Linux" \
              --target main