name: Deploy to GitHub Release

on:
  workflow_run:
    workflows: [Build & Validate Packages]
    types: [completed]
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    container:
      image: archlinux:base
      options: --user 1001:127

    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          pattern: result-*
          path: artifacts/
          merge-multiple: true

      - name: Create & sign repository database
        working-directory: artifacts
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: |
          REPO_NAME="repo"   # ← CHANGE THIS TO YOUR ACTUAL REPO NAME

          SIGN_OPTS=""
          if [ -n "$GPG_PRIVATE_KEY" ]; then
            echo "$GPG_PRIVATE_KEY" | gpg --batch --yes --passphrase "$GPG_PASSPHRASE" --import
            gpg-connect-agent reloadagent /bye || true
            KEYID=$(gpg --list-secret-keys --keyid-format LONG | grep -oP '(?<=sec\s+)[^/]+' | head -1 || echo "")
            [ -n "$KEYID" ] && SIGN_OPTS="--sign --key $KEYID"
          fi

          repo-add $SIGN_OPTS "$REPO_NAME.db.tar.gz" *.pkg.tar.zst
          ln -sf "$REPO_NAME.db.tar.gz" "$REPO_NAME.db"

      - name: Upload to release tag "repository"
        env:
          GH_TOKEN: ${{ github.token }}
        working-directory: artifacts
        run: |
          REPO_NAME="repo"   # ← CHANGE THIS TO YOUR ACTUAL REPO NAME

          gh release upload repository \
            *.pkg.tar.zst \
            *.pkg.tar.zst.sig \
            "$REPO_NAME.db.tar.gz" \
            "$REPO_NAME.db.tar.gz.sig" \
            "$REPO_NAME.db" \
            --clobber || true

          gh release view repository 2>/dev/null || \
            gh release create repository \
              --title "Custom Arch Repository" \
              --notes "Signed binary packages built via GitHub Actions" \
              --target main