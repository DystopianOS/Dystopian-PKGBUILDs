name: Security Scanning
on:
  workflow_dispatch:
  push:
    branches: [ main, devel ]
  pull_request:
    branches: [ main, devel ]
#  schedule:
# - cron: '0 2 * * *'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  shellcheck:
    name: ShellCheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install ShellCheck
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck

      - name: Run ShellCheck
        run: |
          find . -type f -name "*.sh" | while read file; do
            echo "Checking: $file"
            shellcheck -S warning "$file" || true
          done
        continue-on-error: true

      - name: Write ShellCheck result to summary
        if: always()
        run: |
          echo "# ShellCheck Scan Result" >> $GITHUB_STEP_SUMMARY
          echo "Result: ${{ job.status }}" >> $GITHUB_STEP_SUMMARY

  container-scan:
    name: Container Security Scan
    runs-on: ubuntu-latest
    if: contains(github.files, 'Dockerfile')
    steps:
      - uses: actions/checkout@v6

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'

      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v2
        with:
          sarif_file: 'trivy-results.sarif'

  dependency-check:
    name: Dependency Vulnerability Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install safety
        run: pip install safety bandit

      - name: Run safety check
        run: |
          if [ -f requirements.txt ] || [ -f requirements*.txt ]; then
            safety check --file requirements.txt || true
          fi
        continue-on-error: true

      - name: Run bandit
        run: |
          if find . -name "*.py" -type f | head -1 | grep -q .; then
            bandit -r . -f json -o bandit-report.json || true
          fi
        continue-on-error: true

      - name: Write Dependency Check result to summary
        if: always()
        run: |
          echo "# Dependency Vulnerability Scan Result" >> $GITHUB_STEP_SUMMARY
          echo "Result: ${{ job.status }}" >> $GITHUB_STEP_SUMMARY

  npm-audit:
    name: NPM Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Check for package.json
        id: check_npm
        run: |
          if [ -f package.json ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Node.js
        if: steps.check_npm.outputs.exists == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Run npm audit
        if: steps.check_npm.outputs.exists == 'true'
        run: npm audit --audit-level=moderate || true
        continue-on-error: true

  secret-scanning:
    name: Secret Detection
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Run TruffleHog
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD
        continue-on-error: true

      - name: Write Secret Scanning result to summary
        if: always()
        run: |
          echo "# Secret Scanning Result" >> $GITHUB_STEP_SUMMARY
          echo "Result: ${{ job.status }}" >> $GITHUB_STEP_SUMMARY

  sast:
    name: Static Application Security Testing
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Check for supported source files
        id: codeql_check
        run: |
          if find . \( -name '*.cpp' -o -name '*.c' -o -name '*.py' -o -name '*.js' -o -name '*.ts' \) | grep -q .; then
            echo "found=true" >> "$GITHUB_OUTPUT"
          else
            echo "found=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Initialize CodeQL
        if: steps.codeql_check.outputs.found == 'true'
        uses: github/codeql-action/init@v2
        with:
          languages: 'cpp, python, javascript'

      - name: Perform CodeQL Analysis
        if: steps.codeql_check.outputs.found == 'true'
        uses: github/codeql-action/analyze@v2

  docker-build-check:
    name: Docker Build Security Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Check for Dockerfile
        id: check_dockerfile
        run: |
          if [ -f Dockerfile ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build Docker image
        if: steps.check_dockerfile.outputs.exists == 'true'
        run: docker build -t dystopian:test .

      - name: Scan image with Trivy
        if: steps.check_dockerfile.outputs.exists == 'true'
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'dystopian:test'
          format: 'table'
          severity: 'CRITICAL,HIGH,MEDIUM'

  security-audit:
    name: Custom Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Run security-audit.sh
        run: |
          if [ -f security-audit.sh ]; then
            chmod +x security-audit.sh
            ./security-audit.sh
          fi
        continue-on-error: true

  report:
    name: Security Report
    runs-on: ubuntu-latest
    needs: [shellcheck, dependency-check, secret-scanning]
    if: always()
    steps:
      - name: Check results
        run: |
          echo "# Security Scan Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- ShellCheck: ${{ needs.shellcheck.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Dependencies: ${{ needs.dependency-check.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Secrets: ${{ needs.secret-scanning.result }}" >> $GITHUB_STEP_SUMMARY

