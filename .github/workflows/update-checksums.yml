name: Update PKGBUILD checksums & .SRCINFO

on:
  push:
    branches: [main]
    paths: ['**/PKGBUILD', '**/PKGBUILD.*']
  pull_request:
    paths: ['**/PKGBUILD', '**/PKGBUILD.*']

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    container:
      image: archlinux:base-devel
      options: --user root

    steps:
      - name: Checkout repository with full history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install git
        run: pacman -Syu --noconfirm --needed git

      - name: Update checksums & .SRCINFO where needed
        run: |
          set -euo pipefail

          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            BASE="${{ github.event.pull_request.base.sha }}"
            [[ -z "$BASE" ]] && BASE="${{ github.event.repository.default_branch }}"
            MERGE_BASE=$(git merge-base HEAD "$BASE" 2>/dev/null || echo "$BASE")
            CHANGED=$(git diff --name-only "$MERGE_BASE" HEAD | grep -E '/PKGBUILD$' | xargs -r dirname | sort -u)
          else
            BEFORE="${{ github.event.before }}"
            if [[ "$BEFORE" == "0000000000000000000000000000000000000000" || -z "$BEFORE" ]]; then
              CHANGED=$(find . -maxdepth 2 -type f -name PKGBUILD -not -path '*/\.*' -printf '%h\n' | sort -u)
            else
              CHANGED=$(git diff --name-only "$BEFORE" "${{ github.sha }}" | grep -E '/PKGBUILD$' | xargs -r dirname | sort -u)
            fi
          fi

          # Fallback: process all if detection failed
          [[ -z "$CHANGED" ]] && CHANGED=$(find . -maxdepth 2 -type f -name PKGBUILD -not -path '*/\.*' -printf '%h\n' | sort -u)

          echo "Changed PKGBUILD directories:"
          echo "$CHANGED" | tr '\n' ' '

          for dir in $CHANGED; do
            [[ -d "$dir" ]] || continue
            cd "$dir" || continue

            makepkg --printsrcinfo > .tmp.SRCINFO 2>/dev/null || true

            need_update=false
            [[ ! -f .SRCINFO || ! $(diff -q .SRCINFO .tmp.SRCINFO 2>/dev/null) ]] && need_update=true
            grep -qE '^\s*(sha[0-9]+|b2|md5)sums\s*=\s*\(\s*\)' PKGBUILD && need_update=true

            if [[ $need_update = true ]]; then
              echo "Updating checksums in $dir"
              updpkgsums
              makepkg --printsrcinfo > .SRCINFO
              git add PKGBUILD .SRCINFO
            fi
            cd - >/dev/null
          done

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "ci: update checksums & .SRCINFO [skip ci]" --author="GitHub Actions <actions@github.com>" || echo "No changes to commit"
          git push || echo "Push failed (possibly no changes or protected branch)"